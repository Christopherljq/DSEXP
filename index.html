<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <style>

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* ── Loading Screen ───────────────────────────────────────────
    #loading-screen {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      z-index: 100;
      transform: translateY(100%);
      animation: slideUp 0.4s ease forwards;
    }

    #loading-screen.dismiss {
      animation: slideDown 0.4s ease forwards;
    }
    ──────────────────────────────────────────────────────────── */

    /* ── Main Panel ─────────────────────────────────────────────── */
    #main-panel {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      z-index: 10;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top, 0px)
               env(safe-area-inset-right, 0px)
               env(safe-area-inset-bottom, 0px)
               env(safe-area-inset-left, 0px);
      background: #452008;
      transform: translateY(100%);
      animation: slideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* ── Slide Animations ───────────────────────────────────────── */
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0);    }
    }

    @keyframes slideDown {
      from { transform: translateY(0);    }
      to   { transform: translateY(100%); }
    }

    /* ── Three Boxes ────────────────────────────────────────────── */
    .box {
      flex: 1;
      overflow: hidden;
    }

    /* ── EXP Box ────────────────────────────────────────────────── */
    #exp-box {
    }

    /* ── Games Played Box ───────────────────────────────────────── */
    #games-played-box {
    }

    /* ── Mechanics Box ──────────────────────────────────────────── */
    #mechanics-box {
    }

    #mechanics-list {
      height: 100%;
      overflow-y: auto;
    }

  </style>
</head>
<body>

  <!-- ── Loading Screen (commented out) ──────────────────────────
  <div id="loading-screen"></div>
  ──────────────────────────────────────────────────────────────── -->

  <!-- ── Main Panel ───────────────────────────────────────────── -->
  <div id="main-panel">

    <!-- TOP: EXP Box -->
    <div class="box" id="exp-box"></div>

    <!-- MIDDLE: Games Played Box -->
    <div class="box" id="games-played-box"></div>

    <!-- BOTTOM: Mechanics Box -->
    <div class="box" id="mechanics-box">
      <div id="mechanics-list">
        <!-- Empty — mechanics list to be provided -->
      </div>
    </div>

  </div>

  <script>

    const imagesLoaded = new Promise(resolve => resolve());
    */

    /*

    function dismissLoadingScreen() {

    waitForEverything();
    */

    // ── Mechanics List ─────────────────────────────────────────────
    // Empty — full list to be provided
    const MECHANICS = [];

    function renderMechanics(list) {
      const container = document.getElementById("mechanics-list");
      if (!list.length) return;
      container.innerHTML = list.map(name => `
        <div class="mechanic-item" data-mechanic="${name}">${name}</div>
      `).join("");
    }

    renderMechanics(MECHANICS);

    // ── Service Worker ─────────────────────────────────────────────
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js");
    }

  </script>

</html>
