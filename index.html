    /* ─── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

      justify-content: center;

    /* ─── Main Panel ───────────────────────────────────────────── */
    #main-panel {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;           /* dynamic viewport height for mobile */
      background: #121212;
      z-index: 10;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top, 0px)
               env(safe-area-inset-right, 0px)
               env(safe-area-inset-bottom, 0px)
               env(safe-area-inset-left, 0px);
      transform: translateY(100%);
      animation: slideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* ─── Slide Animations ─────────────────────────────────────── */
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0);    }
    }

    @keyframes slideDown {
      from { transform: translateY(0);    }
      to   { transform: translateY(100%); }
    }

    /* ─── Three Boxes ──────────────────────────────────────────── */
    .box {
      flex: 1;
      border-radius: 16px;
      margin: 6px 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* First and last box get extra margin for top/bottom edge */
    .box:first-child { margin-top: 12px;  }
    .box:last-child  { margin-bottom: 12px; }

    .box-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 12px 16px 4px;
      opacity: 0.5;
      color: #fff;
    }

    /* ─── EXP Box (Top) ────────────────────────────────────────── */
    #exp-box {
      background: #1e1e2e;
      border: 1px solid rgba(255,255,255,0.06);
    }

    /* ─── Games Played Box (Middle) ────────────────────────────── */
    #games-played-box {
      background: #1a1a2a;
      border: 1px solid rgba(255,255,255,0.06);
    }

    /* ─── Mechanics Box (Bottom) ───────────────────────────────── */
    #mechanics-box {
      background: #1a2a1a;
      border: 1px solid rgba(255,255,255,0.06);
      flex: 1.4;               /* slightly taller than the other two */
    }

    #mechanics-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 16px 16px;
      /* Mechanics items will be populated here later */
    }

    /* ─── Mechanics item style (ready for when list is provided) ─ */
    .mechanic-item {
      padding: 10px 12px;
      margin: 4px 0;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 0.9rem;
      background: rgba(255,255,255,0.05);
      cursor: pointer;
      transition: background 0.15s ease;

      /* COMMENTED OUT: interaction handler attached in JS
      pointer-events: auto;
      */
      pointer-events: none;     /* non-interactive until spec confirmed */
    }

    /* COMMENTED OUT: mechanic item hover/active interaction
    .mechanic-item:hover  { background: rgba(255,255,255,0.10); }
    .mechanic-item:active { background: rgba(255,255,255,0.15); }
    .mechanic-item.selected {
      background: rgba(100,220,100,0.15);
      border: 1px solid rgba(100,220,100,0.3);
    }
    */

  </style>
</head>

    // ─── Mechanics List Population ────────────────────────────────────

    const MECHANICS = [];

    function renderMechanics(list) {
