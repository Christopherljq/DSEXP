<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>

    :root {
      --w1: #d49050;
      --w2: #8b4513;
      --w3: #5a2e0e;
      --w4: #2a1005;
      --w5: #452008;
      --ws: #1a0803;
      --wt: #fff5e0;
      --pc: #c4b090;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* ── Loading Screen ──────────────────────────────────────────
    #loading-screen {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      z-index: 100;
      transform: translateY(100%);
      animation: slideUp 0.4s ease forwards;
    }

    #loading-screen.dismiss {
      animation: slideDown 0.4s ease forwards;
    }
    ─────────────────────────────────────────────────────────── */

    /* ── Main Panel ─────────────────────────────────────────────── */
    #main-panel {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      z-index: 10;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: env(safe-area-inset-top, 0px)
               env(safe-area-inset-right, 0px)
               env(safe-area-inset-bottom, 0px)
               env(safe-area-inset-left, 0px);
      background:
        radial-gradient(ellipse at 25% 60%, rgba(20,80,20,.95) 0%, transparent 45%),
        radial-gradient(ellipse at 10% 80%, rgba(10,50,10,.9) 0%, transparent 35%),
        radial-gradient(ellipse at 65% 15%, rgba(80,160,200,.5) 0%, transparent 55%),
        radial-gradient(ellipse at 90% 10%, rgba(60,120,160,.4) 0%, transparent 40%),
        linear-gradient(160deg, #6ab080 0%, #4a9060 20%, #2a6030 40%, #4a9060 60%, #6ab080 80%, #8ad0a0 100%);
      transform: translateY(100%);
      animation: slideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* ── Tree Trunk ─────────────────────────────────────────────── */

      clip-path: polygon(0 0, 75% 0, 100% 8%, 90% 25%, 100% 45%, 85% 60%, 100% 75%, 88% 90%, 100% 100%, 0 100%);
      filter: drop-shadow(6px 0 14px rgba(0,0,0,.3));
      pointer-events: none;
      z-index: 1;
    }
*/
    /* ── Mushrooms ──────────────────────────────────────────────── */
    #mushrooms {
      position: absolute;
      left: 18px;
      bottom: 48px;
      width: 120px;
      height: 150px;
      pointer-events: none;
      z-index: 2;
    }

    /* ── Slide Animations ───────────────────────────────────────── */
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0);    }
    }

    @keyframes slideDown {
      from { transform: translateY(0);    }
      to   { transform: translateY(100%); }
    }

    /* ── Three Boxes ────────────────────────────────────────────── */
    .box {
      flex: 1;
      overflow: hidden;
      position: relative;
      z-index: 3;
    }

    #exp-box          {}
    #games-played-box {}

    #mechanics-box {
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #mechanics-list {
      flex: 1;
      overflow-y: auto;
      font-family: 'Crimson Text', serif;
    }

  </style>
</head>
<body>

  <!-- ── Loading Screen (commented out) ──────────────────────────

  <!-- ── Main Panel ───────────────────────────────────────────── -->
  <div id="main-panel">

    <!-- Tree trunk via ::before pseudo-element -->

    <!-- Mushrooms -->

    <!-- TOP: EXP Box -->
    <div class="box" id="exp-box"></div>

    <!-- MIDDLE: Games Played Box -->
    <div class="box" id="games-played-box"></div>

    <!-- BOTTOM: Mechanics Box -->
    <div class="box" id="mechanics-box">
      <div id="mechanics-list">
        <!-- Empty — mechanics list to be provided -->
      </div>
    </div>

  </div>

    // ── Mechanics List ─────────────────────────────────────────────
    // Empty — full list to be provided
    const MECHANICS = [];

    function renderMechanics(list) {
      const container = document.getElementById("mechanics-list");
      if (!list.length) return;
      container.innerHTML = list.map(name => `
        <div class="mechanic-item" data-mechanic="${name}">${name}</div>
      `).join("");
    }

    renderMechanics(MECHANICS);

    // ── Service Worker ─────────────────────────────────────────────
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/DSEXP/sw.js");
