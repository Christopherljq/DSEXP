<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <style>

    :root {
      --w1: #d49050;
      --w2: #8b4513;
      --w3: #5a2e0e;
      --w4: #2a1005;
      --w5: #452008;
      --ws: #1a0803;
      --wt: #fff5e0;
      --pc: #c4b090;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* ── Loading Screen ──────────────────────────────────────────
    #loading-screen {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      z-index: 100;
      transform: translateY(100%);
      animation: slideUp 0.4s ease forwards;
    }

    #loading-screen.dismiss {
      animation: slideDown 0.4s ease forwards;
    }
    ─────────────────────────────────────────────────────────── */

    /* ── Main Panel ─────────────────────────────────────────────── */
    #main-panel {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      z-index: 10;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top, 0px)
               env(safe-area-inset-right, 0px)
               env(safe-area-inset-bottom, 0px)
               env(safe-area-inset-left, 0px);
      background: #452008;
      transform: translateY(100%);
      animation: slideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* ── Tree Trunk ─────────────────────────────────────────────── */
    #main-panel::before {
      content: "";
      position: absolute;
      left: -30px;
      top: 0;
      bottom: 0;
      width: 210px;
      background: repeating-linear-gradient(
        175deg,
        rgba(200,170,80,.85) 0px,  rgba(200,170,80,.85) 8px,
        rgba(220,190,110,.8) 8px,  rgba(220,190,110,.8) 18px,
        rgba(190,160,70,.85) 18px, rgba(190,160,70,.85) 28px,
        rgba(210,180,95,.82) 28px, rgba(210,180,95,.82) 40px
      );
      clip-path: polygon(0 0, 75% 0, 100% 8%, 90% 25%, 100% 45%, 85% 60%, 100% 75%, 88% 90%, 100% 100%, 0 100%);
      filter: drop-shadow(6px 0 14px rgba(0,0,0,.3));
      pointer-events: none;
      z-index: 1;
    }

    /* ── Mushrooms ──────────────────────────────────────────────── */
    #mushrooms {
      position: absolute;
      left: 18px;
      bottom: 48px;
      width: 120px;
      height: 150px;
      pointer-events: none;
      z-index: 2;
    }

    /* ── Slide Animations ───────────────────────────────────────── */
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0);    }
    }

    @keyframes slideDown {
      from { transform: translateY(0);    }
      to   { transform: translateY(100%); }
    }

    /* ── Three Boxes ────────────────────────────────────────────── */
    .box {
      flex: 1;
      overflow: hidden;
      position: relative;
      z-index: 3;
    }

    #exp-box          {}
    #games-played-box {}

    #mechanics-box {
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #mechanics-list {
      flex: 1;
      overflow-y: auto;
      font-family: 'Crimson Text', serif;
    }

  </style>
</head>
<body>

  <!-- ── Loading Screen (commented out) ──────────────────────────
  <div id="loading-screen"></div>
  ──────────────────────────────────────────────────────────────── -->

  <!-- ── Main Panel ───────────────────────────────────────────── -->
  <div id="main-panel">

    <!-- Tree trunk via ::before pseudo-element -->

    <!-- Mushrooms -->
    <svg id="mushrooms" width="120" height="150" viewBox="0 0 130 160" fill="none">
      <ellipse cx="55" cy="100" rx="18" ry="28" fill="#d4c8a0" stroke="#a09060" stroke-width="1.5"/>
      <ellipse cx="55" cy="100" rx="10" ry="26" fill="#e0d8b0"/>
      <path d="M10 105 Q20 55 55 50 Q90 55 100 105 Q78 118 55 115 Q32 118 10 105Z" fill="#d44010"/>
      <path d="M10 105 Q20 55 55 50 Q90 55 100 105 Q78 118 55 115 Q32 118 10 105Z" fill="none" stroke="#a03008" stroke-width="1.5"/>
      <ellipse cx="30" cy="80" rx="8" ry="5" fill="rgba(255,255,255,0.25)" transform="rotate(-20 30 80)"/>
      <ellipse cx="72" cy="68" rx="6" ry="4" fill="rgba(255,255,255,0.2)" transform="rotate(10 72 68)"/>
      <ellipse cx="90" cy="128" rx="10" ry="18" fill="#d4c8a0" stroke="#a09060" stroke-width="1"/>
      <path d="M68 130 Q75 100 90 96 Q105 100 112 130 Q102 138 90 136 Q78 138 68 130Z" fill="#e8b820"/>
      <path d="M68 130 Q75 100 90 96 Q105 100 112 130 Q102 138 90 136 Q78 138 68 130Z" fill="none" stroke="#c09010" stroke-width="1.2"/>
      <ellipse cx="22" cy="145" rx="7" ry="12" fill="#c8c0a0" stroke="#a09880" stroke-width="1"/>
      <path d="M8 147 Q12 128 22 125 Q32 128 36 147 Q30 152 22 151 Q14 152 8 147Z" fill="#b0a890"/>
    </svg>

    <!-- TOP: EXP Box -->
    <div class="box" id="exp-box"></div>

    <!-- MIDDLE: Games Played Box -->
    <div class="box" id="games-played-box"></div>

    <!-- BOTTOM: Mechanics Box -->
    <div class="box" id="mechanics-box">
      <div id="mechanics-list">
        <!-- Empty — mechanics list to be provided -->
      </div>
    </div>

  </div>

  <script>

    // ── Mechanics List ─────────────────────────────────────────────
    // Empty — full list to be provided
    const MECHANICS = [];

    function renderMechanics(list) {
      const container = document.getElementById("mechanics-list");
      if (!list.length) return;
      container.innerHTML = list.map(name => `
        <div class="mechanic-item" data-mechanic="${name}">${name}</div>
      `).join("");
    }

    renderMechanics(MECHANICS);

    // ── Service Worker ─────────────────────────────────────────────
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/DSEXP/sw.js");
    }

</body>
</html>
